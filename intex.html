<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-container">
      <h1 class="game-title">Rock • Paper • Scissors</h1>

      <div class="score-board">
        <div class="score-item">
          <span class="label">You</span>
          <span id="player-score" class="score">0</span>
        </div>
        <div class="score-item">
          <span class="label">Computer</span>
          <span id="computer-score" class="score">0</span>
        </div>
      </div>

      <p class="status-text" id="status">Make your move!</p>

      <div class="choices">
        <button class="choice-btn rock" data-choice="rock" aria-label="Choose Rock">
          🪨 Rock
        </button>
        <button class="choice-btn paper" data-choice="paper" aria-label="Choose Paper">
          📄 Paper
        </button>
        <button class="choice-btn scissors" data-choice="scissors" aria-label="Choose Scissors">
          ✂️ Scissors
        </button>
      </div>

      <div class="round-result" id="round-result"></div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
